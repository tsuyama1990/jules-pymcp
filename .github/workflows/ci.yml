name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch so stale runs don't block merges
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate (ruff + mypy + pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      # --- Linting (ruff check with ALL rules as configured in pyproject.toml) ---
      - name: Lint — ruff check
        run: uv run ruff check .

      - name: Lint — ruff format
        run: uv run ruff format --check .

      # --- Type checking (strict, matches pyproject.toml [tool.mypy]) ---
      - name: Type check — mypy --strict
        run: uv run mypy --strict .

      # --- Security scanning ---
      - name: Security — bandit (medium severity + confidence)
        run: uv run bandit -c pyproject.toml -r jules_mcp/

      # --- Tests with coverage gate (line + branch ≥ 90 %) ---
      - name: Test — pytest (line + branch coverage ≥ 90 %)
        run: uv run pytest
